name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-2

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Debug Info
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "Account: $ACCOUNT_ID"
          echo "Bucket: gamex-tf-state-$ACCOUNT_ID"
          echo "Image tag: ${{ github.sha }}"
          echo "Terraform version: $(terraform version)"
          aws s3api head-bucket --bucket "gamex-tf-state-$ACCOUNT_ID" && echo "Bucket exists" || echo "Bucket missing"

      - name: Create Terraform State Bucket
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV
          BUCKET="gamex-tf-state-$ACCOUNT_ID"
          aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null || \
            aws s3 mb "s3://$BUCKET" --region $AWS_REGION

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=gamex-tf-state-$ACCOUNT_ID" \
            -backend-config="key=gamex/terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="use_lockfile=true"
        working-directory: terraform/

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform/

      - name: Import orphaned resources
        continue-on-error: true
        run: |
          # Import resources that may exist from previous failed runs
          terraform import -var="auth_secret=x" -var="image_tag=x" \
            aws_iam_role.ecs_execution gamex-ecs-execution 2>/dev/null || true
          terraform import -var="auth_secret=x" -var="image_tag=x" \
            aws_iam_role.ecs_task gamex-ecs-task 2>/dev/null || true
          terraform import -var="auth_secret=x" -var="image_tag=x" \
            aws_cloudwatch_log_group.gamex /ecs/gamex 2>/dev/null || true
          # Import ALB + listener if they exist
          LB_ARN=$(aws elbv2 describe-load-balancers --names gamex --query "LoadBalancers[0].LoadBalancerArn" --output text 2>/dev/null)
          if [ "$LB_ARN" != "None" ] && [ -n "$LB_ARN" ]; then
            terraform import -var="auth_secret=x" -var="image_tag=x" \
              aws_lb.gamex "$LB_ARN" 2>/dev/null || true
            LISTENER_ARN=$(aws elbv2 describe-listeners --load-balancer-arn "$LB_ARN" --query "Listeners[0].ListenerArn" --output text 2>/dev/null)
            if [ "$LISTENER_ARN" != "None" ] && [ -n "$LISTENER_ARN" ]; then
              terraform import -var="auth_secret=x" -var="image_tag=x" \
                aws_lb_listener.gamex "$LISTENER_ARN" 2>/dev/null || true
            fi
          fi
        working-directory: terraform/

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="auth_secret=${{ secrets.AUTH_SECRET }}" \
            -var="image_tag=${{ github.sha }}"
        working-directory: terraform/

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: gamex
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Force ECS redeployment
        run: |
          aws ecs update-service --cluster gamex --service gamex --force-new-deployment
