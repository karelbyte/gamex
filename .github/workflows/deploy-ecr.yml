name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-2

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Create Terraform State Backend
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV

          BUCKET="gamex-tf-state-$ACCOUNT_ID"
          aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null || \
            aws s3 mb "s3://$BUCKET" --region $AWS_REGION

          aws dynamodb describe-table --table-name gamex-tf-lock --region $AWS_REGION 2>/dev/null || \
            aws dynamodb create-table --table-name gamex-tf-lock \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region $AWS_REGION

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=gamex-tf-state-$ACCOUNT_ID" \
            -backend-config="key=gamex/terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="dynamodb_table=gamex-tf-lock"
        working-directory: terraform/

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="auth_secret=${{ secrets.AUTH_SECRET }}" \
            -var="image_tag=${{ github.sha }}"
        working-directory: terraform/

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: gamex
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Force ECS redeployment
        run: |
          aws ecs update-service --cluster gamex --service gamex --force-new-deployment
